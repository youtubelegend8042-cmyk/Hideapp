<!DOCTYPE html>

<html lang="hi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Smart Vault Abhishek</title>

  <style>

    body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 15px; margin: 0; }

    .container {

      background: white; max-width: 420px; margin: 20px auto;

      padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);

    }

    h2 { color: #333; margin-top: 0; }

    

    #gallery {

      display: none; flex-wrap: wrap; justify-content: center; gap: 10px;

      margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 15px; border: 1px dashed #bbb;

    }

    .photo-card { background: white; padding: 5px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .thumb { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; }

    

    button {

      width: 100%; margin: 8px 0; padding: 14px;

      border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px;

      transition: all 0.3s ease;

    }

    .btn-unlock { background: #007bff; color: white; }

    .btn-hide { background: #dc3545; color: white; box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3); }

    .btn-settings { background: #6c757d; color: white; font-size: 13px; width: auto; padding: 8px 20px; margin-top: 10px; }

    

    /* Settings Box */

    #settingsBox {

      display: none; background: #f1f3f5; padding: 15px; margin-top: 15px; border-radius: 12px; text-align: left;

    }

    label { font-size: 14px; font-weight: bold; color: #555; }

    select { 

      width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; 

      border: 1px solid #ddd; font-size: 14px; outline: none;

    }



    /* Full View Overlay */

    #overlay {

      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;

      background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;

    }

    #overlay img { max-width: 90%; max-height: 80%; border-radius: 10px; }

  </style>

</head>

<body>



  <div class="container">

    <h2>🔐 Abhishek Vault</h2>



    <input type="file" id="fileInput" accept="image/*" multiple style="font-size: 12px; margin-bottom: 10px;">



    <div id="gallery"></div>



    <button class="btn-unlock" id="unlockBtn" onclick="unlock()">Unlock Gallery</button>

    <button id="closeBtn" style="display:none; background:#495057; color:white;" onclick="location.reload()">Lock & Refresh</button>

    

    <button class="btn-hide" id="dynamicHideBtn" onclick="goToSelectedApp()">Hide & Open App</button>



    <button class="btn-settings" onclick="toggleSettings()">⚙️ Settings (Choose App)</button>



    <div id="settingsBox">

      <label>Jab 'Hide' dabayein toh kya khule?</label>

      <select id="appSelector" onchange="updateButtonText()">

        <option value="https://www.instagram.com">Instagram</option>

        <option value="https://www.facebook.com">Facebook</option>

        <option value="https://www.youtube.com">YouTube</option>

        <option value="https://www.google.com">Google</option>

      </select>

    </div>

  </div>



  <div id="overlay" onclick="this.style.display='none'">

    <img id="fullImg">

  </div>



  <script>

    const pin = "1234";

    let selectedApp = "https://www.instagram.com";



    // App name and Link update karne ka logic

    function updateButtonText() {

      const selector = document.getElementById('appSelector');

      selectedApp = selector.value;

      let appName = selector.options[selector.selectedIndex].text;

      document.getElementById('dynamicHideBtn').innerText = "Hide & Open " + appName;

    }



    function toggleSettings() {

      const box = document.getElementById('settingsBox');

      box.style.display = (box.style.display === "block") ? "none" : "block";

    }



    function goToSelectedApp() {

      window.location.href = selectedApp;

    }



    // Photo selection logic

    document.getElementById('fileInput').onchange = function(e) {

      const files = e.target.files;

      if(files.length > 0) {

        alert(files.length + " Photos add ho gayi hain. Unlock karke dekhein.");

        for (let file of files) {

          const reader = new FileReader();

          reader.onload = function(event) {

            const div = document.createElement('div');

            div.className = 'photo-card';

            div.innerHTML = `

              <img src="${event.target.result}" class="thumb"><br>

              <div style="margin-top:5px; display:flex; gap:5px; justify-content:center;">

                <button onclick="viewPhoto('${event.target.result}')" style="width:auto; padding:4px 8px; font-size:10px; background:#17a2b8; color:white; margin:0;">View</button>

                <button onclick="this.parentElement.parentElement.remove()" style="width:auto; padding:4px 8px; font-size:10px; background:#dc3545; color:white; margin:0;">Del</button>

              </div>`;

            document.getElementById('gallery').appendChild(div);

          }

          reader.readAsDataURL(file);

        }

      }

    };



    function unlock() {

      if (prompt("Enter Secret PIN:") === pin) {

        document.getElementById('gallery').style.display = "flex";

        document.getElementById('unlockBtn').style.display = "none";

        document.getElementById('closeBtn').style.display = "block";

      } else { 

        alert("Galat PIN!"); 

      }

    }



    function viewPhoto(src) {

      document.getElementById('fullImg').src = src;

      document.getElementById('overlay').style.display = "flex";

    }

    

    // Default text set karne ke liye

    updateButtonText();

</script>



</body>

</html>
